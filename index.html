<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> HBD Claire </title>

  <style>
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
      font-family: Arial, sans-serif;
    }

    /* กล่อง Login */
    .form {
      width: 420px;
      padding: 35px;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      transition: 0.3s;
    }

    .form:hover {
      transform: scale(1.03);
    }

    #heading {
      text-align: center;
      font-size: 1.9em;
      margin-bottom: 20px;
      color: #d34343;
      font-weight: bold;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f2f2f2;
      padding: 14px;
      border-radius: 30px;
      margin-bottom: 15px;
    }

    .input-icon {
      fill: #d34343;
    }

    .input-field {
      border: none;
      outline: none;
      background: none;
      width: 100%;
      font-size: 1.05em;
      color: #333;
    }

    .btn {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .button1 {
      flex: 1;
      font-size: 1.05em;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #d34343;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .button1:hover {
      background: #b53030;
    }
  </style>
</head>

<body>

  <form class="form" onsubmit="return false;">
    <p id="heading">Login</p>

    <div class="field">
      <svg class="input-icon" width="18" height="18" viewBox="0 0 16 16">
        <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156z"/>
      </svg>
      <input id="user" class="input-field" type="text" placeholder="Username">
    </div>

    <div class="field">
      <svg class="input-icon" width="18" height="18" viewBox="0 0 16 16">
        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
      </svg>
      <input id="pass" class="input-field" type="password" placeholder="Password">
    </div>
     <div class="btn">
      <button type="button" class="button1" onclick="login()">Login</button>
    </div>
  </form>

  <script>
    function login() {
      // ດຶງຄ່າຈາກ input
      var user = document.getElementById("user").value;
      var pass = document.getElementById("pass").value;

      // ກວດສອບເງື່ອນໄຂ
      if (user === "HAPPY BIRTHDAY TO YOU" && pass === "You is my sun") {
        window.location.href = "love-letter.html";
      } else {
        alert("Username ຫຼື Password ບໍ່ຖືກຕ້ອງ! ກະລຸນາລອງໃໝ່");
      }
    }
   
  </script>
 
</body>
</html>
